max_iterations: 200
checkpoint_interval: 20

llm:
  api_base: "https://generativelanguage.googleapis.com/v1beta/openai"
  primary_model: "gemini-2.5-flash"
  primary_model_weight: 0.7
  secondary_model: "gemini-2.5-pro"
  secondary_model_weight: 0.3
  temperature: 0.8
  max_tokens: 16000
  timeout: 120

prompt:
  system_message: |
    You are an expert in numerical computing and floating-point arithmetic.
    Your task is to implement a high-precision, correctly-rounded, fast sin(x) function.

    Key techniques to consider:
    - Cohn-Waite range reduction (high-precision pi constants)
    - Minimax polynomial approximations (Remez algorithm coefficients)
    - Chebyshev polynomial approximations
    - Estrin's or Horner's scheme for polynomial evaluation
    - Compensated summation to reduce rounding error
    - Table-based approaches with polynomial correction
    - Double-double arithmetic for intermediate precision
    - Payne-Hanek range reduction for large arguments

    Metrics you are optimizing:
    - precision_score: based on maximum ULP error (lower is better)
    - rounding_score: fraction of correctly-rounded results
    - speed_score: execution speed relative to math.sin()

    The function must handle all float64 inputs including edge cases
    (very small values, very large values, negative values, multiples of pi).

database:
  population_size: 50
  archive_size: 30
  num_islands: 5
  feature_dimensions: ["score", "complexity"]
  feature_bins: 10
  elite_selection_ratio: 0.2
  exploration_ratio: 0.2
  exploitation_ratio: 0.6
  migration_interval: 30
  migration_rate: 0.1

evaluator:
  timeout: 120
  cascade_thresholds: [0.02]
  parallel_evaluations: 3

diff_based_evolution: true
max_code_length: 30000
